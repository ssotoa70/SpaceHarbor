# Redirect all nginx writable paths to /tmp for non-root container execution.
# Included at the top level of nginx.conf via Dockerfile sed injection.
# These override compile-time defaults that point to /var/cache/nginx/ and /var/log/nginx/.

pid /tmp/nginx/nginx.pid;
error_log /tmp/nginx/error.log warn;

client_body_temp_path /tmp/nginx/client_temp;
proxy_temp_path /tmp/nginx/proxy_temp;
fastcgi_temp_path /tmp/nginx/fastcgi_temp;
uwsgi_temp_path /tmp/nginx/uwsgi_temp;
scgi_temp_path /tmp/nginx/scgi_temp;
