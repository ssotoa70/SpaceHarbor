<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Deep space navy background -->
    <linearGradient id="navyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020b18"/>
      <stop offset="100%" stop-color="#051525"/>
    </linearGradient>

    <!-- Crystal facets - Navy/Cyan palette -->
    <linearGradient id="nFacetTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="nFacetLeft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <linearGradient id="nFacetRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="nFacetShaft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="nFacetArm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="nGoldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Ambient glow -->
    <radialGradient id="nIconGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <!-- Orbital -->
    <linearGradient id="nOrbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="40%" stop-color="#67e8f9" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="nTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <filter id="nGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nTextGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" fill="url(#navyBg)" rx="12"/>

  <!-- Grid lines (subtle technical feel) -->
  <g opacity="0.04" stroke="#22d3ee" stroke-width="0.5">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="120" y1="0" x2="120" y2="160"/>
    <line x1="240" y1="0" x2="240" y2="160"/>
    <line x1="360" y1="0" x2="360" y2="160"/>
  </g>

  <!-- Starfield -->
  <g opacity="0.5">
    <circle cx="28" cy="18" r="0.8" fill="white"/>
    <circle cx="52" cy="42" r="0.4" fill="white"/>
    <circle cx="418" cy="28" r="0.9" fill="#67e8f9"/>
    <circle cx="452" cy="52" r="0.5" fill="white"/>
    <circle cx="438" cy="132" r="0.6" fill="white"/>
    <circle cx="22" cy="118" r="0.5" fill="#38bdf8"/>
    <circle cx="378" cy="14" r="0.4" fill="white"/>
    <circle cx="462" cy="98" r="0.7" fill="#67e8f9"/>
    <circle cx="32" cy="78" r="0.4" fill="white"/>
    <circle cx="398" cy="148" r="0.5" fill="white"/>
    <circle cx="200" cy="12" r="0.5" fill="#67e8f9"/>
    <circle cx="310" cy="148" r="0.4" fill="white"/>
  </g>

  <!-- Ambient glow -->
  <ellipse cx="80" cy="80" rx="55" ry="55" fill="url(#nIconGlow)"/>

  <!-- === GEOMETRIC CRYSTAL ANCHOR ICON === -->

  <!-- Back orbital ring -->
  <ellipse cx="80" cy="80" rx="48" ry="14" fill="none" stroke="url(#nOrbitGrad)" stroke-width="1.2" opacity="0.8"/>
  <ellipse cx="80" cy="80" rx="48" ry="14" fill="none" stroke="#051525" stroke-width="1.5"
    stroke-dasharray="80 70" stroke-dashoffset="0" opacity="1"/>

  <!-- === TOP RING (faceted) === -->
  <polygon points="80,32 86,35.5 86,41 80,44.5 74,41 74,35.5" fill="url(#nFacetTop)" opacity="0.9"/>
  <polygon points="80,36 83,37.8 83,40.2 80,42 77,40.2 77,37.8" fill="#051525"/>
  <line x1="80" y1="32" x2="86" y2="35.5" stroke="#a5f3fc" stroke-width="0.8" opacity="0.9"/>
  <polygon points="80,30 88,34 88,42 80,46 72,42 72,34" fill="none" stroke="#0891b2" stroke-width="0.8" opacity="0.4"/>

  <!-- === SHAFT === -->
  <polygon points="77,44 83,44 83,88 77,88" fill="url(#nFacetShaft)"/>
  <polygon points="75,45.5 77,44 77,88 75,89.5" fill="#164e63" opacity="0.9"/>
  <polygon points="83,44 85,45.5 85,89.5 83,88" fill="#22d3ee" opacity="0.5"/>
  <line x1="77" y1="44" x2="83" y2="44" stroke="#a5f3fc" stroke-width="0.8"/>

  <!-- === CROSSBAR === -->
  <polygon points="55,62 77,62 77,68 55,68" fill="url(#nFacetArm)"/>
  <polygon points="55,68 77,68 77,70 55,70" fill="#164e63"/>
  <polygon points="52,65 57,62 57,68 52,65" fill="#0891b2"/>
  <polygon points="52,65 57,68 57,70 52,65" fill="#0c4a6e"/>

  <polygon points="83,62 105,62 105,68 83,68" fill="url(#nFacetArm)"/>
  <polygon points="83,68 105,68 105,70 83,70" fill="#164e63"/>
  <polygon points="108,65 103,62 103,68 108,65" fill="#0e7490"/>
  <polygon points="108,65 103,68 103,70 108,65" fill="#0c4a6e"/>

  <!-- === BOTTOM FLUKES === -->
  <polygon points="77,88 80,98 62,106 60,94" fill="#0891b2"/>
  <polygon points="77,88 60,94 62,106 58,108 56,96 68,84" fill="#155e75" opacity="0.8"/>
  <polygon points="77,88 80,98 62,106" fill="#22d3ee" opacity="0.6"/>
  <line x1="77" y1="88" x2="62" y2="106" stroke="#67e8f9" stroke-width="0.6" opacity="0.7"/>

  <polygon points="83,88 80,98 98,106 100,94" fill="#0e7490"/>
  <polygon points="83,88 100,94 98,106 102,108 104,96 92,84" fill="#155e75" opacity="0.8"/>
  <polygon points="83,88 80,98 98,106" fill="#38bdf8" opacity="0.6"/>
  <line x1="83" y1="88" x2="98" y2="106" stroke="#a5f3fc" stroke-width="0.6" opacity="0.7"/>

  <!-- Bottom tip -->
  <polygon points="77,88 83,88 80,100" fill="url(#nGoldAccent)" filter="url(#nGlow)"/>

  <!-- Accent dots -->
  <circle cx="52" cy="65" r="2.5" fill="#38bdf8" filter="url(#nGlow)"/>
  <circle cx="108" cy="65" r="2.5" fill="#38bdf8" filter="url(#nGlow)"/>
  <circle cx="62" cy="106" r="2" fill="#67e8f9" opacity="0.8" filter="url(#nGlow)"/>
  <circle cx="98" cy="106" r="2" fill="#67e8f9" opacity="0.8" filter="url(#nGlow)"/>

  <!-- Front orbital ring -->
  <path d="M 48 87 A 48 14 0 0 0 112 87" fill="none" stroke="url(#nOrbitGrad)" stroke-width="1.2" opacity="0.8"/>

  <!-- === TYPOGRAPHY === -->
  <!-- "Space" thin -->
  <text x="148" y="72" font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
    font-size="36" font-weight="300" letter-spacing="3"
    fill="#cbd5e1" filter="url(#nTextGlow)">Space</text>

  <!-- "Harbor" bold -->
  <text x="146" y="108" font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
    font-size="36" font-weight="700" letter-spacing="2"
    fill="url(#nTextGrad)" filter="url(#nTextGlow)">Harbor</text>

  <!-- Divider line -->
  <line x1="148" y1="78" x2="380" y2="78" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>

  <!-- Tagline -->
  <text x="150" y="130" font-family="'Trebuchet MS', monospace"
    font-size="9" letter-spacing="4" fill="#0891b2" opacity="0.9">POWERED BY VAST DATA</text>
</svg>
