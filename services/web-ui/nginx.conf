# Redirect nginx temp/cache paths to /tmp for non-root execution.
# These are http-context directives (must be outside server{} block).
client_body_temp_path /tmp/nginx/client_temp;
proxy_temp_path /tmp/nginx/proxy_temp;
fastcgi_temp_path /tmp/nginx/fastcgi_temp;
uwsgi_temp_path /tmp/nginx/uwsgi_temp;
scgi_temp_path /tmp/nginx/scgi_temp;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http: https:; media-src 'self' blob: http: https:; connect-src 'self' http: https:" always;

    # S3 upload proxy — browser PUTs presigned URLs through this proxy to
    # avoid CSP/CORS issues when the VAST S3 VIP is on a different origin.
    # The web-ui rewrites the presigned URL to go through /s3-proxy/ and
    # nginx forwards to the actual S3 endpoint.
    location /s3-proxy/ {
        # Extract the target from the path: /s3-proxy/<host>/<rest>
        # e.g. /s3-proxy/172.200.201.67/sergio-bucket/key?sig=...
        resolver 8.8.8.8 valid=30s ipv6=off;
        rewrite ^/s3-proxy/([^/]+)(/.*)$ $2 break;
        proxy_pass http://$1;
        proxy_set_header Host $1;
        proxy_pass_request_headers on;

        # Stream uploads without buffering (enables XHR progress events)
        proxy_request_buffering off;
        proxy_buffering off;

        # Forward Range header for video streaming (seek / partial content)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # Allow large uploads (EXR sequences can be GB)
        client_max_body_size 10G;
    }

    # Swagger UI — exact match on /api redirects to trailing slash
    location = /api {
        return 301 /api/;
    }

    # Swagger UI static assets and API JSON spec
    location /api/ {
        proxy_pass http://control-plane:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # OpenAPI JSON spec
    location = /openapi.json {
        proxy_pass http://control-plane:8080;
        proxy_set_header Host $host;
    }

    # Reverse proxy SCIM requests to control-plane
    location /scim/ {
        proxy_pass http://control-plane:8080;
        proxy_set_header Host $host;
    }

    # Vite hashed static assets — long cache (only actual files with extensions)
    location ~* ^/assets/.+\.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|eot|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — serve index.html for all non-file routes.
    # Omit $uri/ to prevent nginx matching the Vite /assets/ directory
    # and issuing 301 redirects for SPA routes like /assets/hierarchy.
    location / {
        try_files $uri /index.html;
    }

    # Disable caching for index.html itself
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
