# Redirect nginx temp/cache paths to /tmp for non-root execution.
# These are http-context directives (must be outside server{} block).
client_body_temp_path /tmp/nginx/client_temp;
proxy_temp_path /tmp/nginx/proxy_temp;
fastcgi_temp_path /tmp/nginx/fastcgi_temp;
uwsgi_temp_path /tmp/nginx/uwsgi_temp;
scgi_temp_path /tmp/nginx/scgi_temp;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https:" always;

    # Swagger UI — exact match on /api redirects to trailing slash
    location = /api {
        return 301 /api/;
    }

    # Swagger UI static assets and API JSON spec
    location /api/ {
        proxy_pass http://control-plane:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # OpenAPI JSON spec
    location = /openapi.json {
        proxy_pass http://control-plane:8080;
        proxy_set_header Host $host;
    }

    # Reverse proxy SCIM requests to control-plane
    location /scim/ {
        proxy_pass http://control-plane:8080;
        proxy_set_header Host $host;
    }

    # Hashed static assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html itself
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
