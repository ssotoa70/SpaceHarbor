services:
  control-plane:
    build:
      context: ./services/control-plane
    container_name: assetharbor-control-plane
    environment:
      NODE_ENV: development
      PORT: 8080
      ASSETHARBOR_PERSISTENCE_BACKEND: ${ASSETHARBOR_PERSISTENCE_BACKEND:-local}
      ASSETHARBOR_VAST_STRICT: ${ASSETHARBOR_VAST_STRICT:-false}
      ASSETHARBOR_API_KEY: ${ASSETHARBOR_API_KEY:-}
      VAST_DATABASE_URL: ${VAST_DATABASE_URL:-}
      VAST_EVENT_BROKER_URL: ${VAST_EVENT_BROKER_URL:-}
      VAST_DATAENGINE_URL: ${VAST_DATAENGINE_URL:-}
      VAST_API_TOKEN: ${VAST_API_TOKEN:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  media-worker:
    build:
      context: ./services/media-worker
    container_name: assetharbor-media-worker
    environment:
      CONTROL_PLANE_URL: http://control-plane:8080
      CONTROL_PLANE_API_KEY: ${CONTROL_PLANE_API_KEY:-}
      VAST_DATAENGINE_URL: ${VAST_DATAENGINE_URL:-}
      VAST_API_TOKEN: ${VAST_API_TOKEN:-}
    depends_on:
      control-plane:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ps aux | grep '[p]ython.*main.py' > /dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  openassetio-manager:
    build:
      context: services/openassetio-manager
      dockerfile: Dockerfile
    container_name: assetharbor-openassetio-manager
    ports:
      - "8001:8001"
    environment:
      - DEV_MODE=true
      - TRINO_HOST=vastdb
      - TRINO_PORT=8080
      - CONTROL_PLANE_URL=http://control-plane:8080
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  web-ui:
    build:
      context: ./services/web-ui
    container_name: assetharbor-web-ui
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_API_KEY: ${VITE_API_KEY:-}
    ports:
      - "4173:4173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      control-plane:
        condition: service_healthy
    restart: unless-stopped
