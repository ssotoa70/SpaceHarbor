name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: PR guardrails (staleness and size)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_MAX_CHANGED_FILES: "40"
          PR_MAX_TOTAL_CHANGES: "1200"
        run: node scripts/ci/pr-guardrails.js

      - name: Install control-plane dependencies
        run: npm ci --prefix services/control-plane

      - name: Install web-ui dependencies
        run: npm ci --prefix services/web-ui

      - name: Install media-worker dependencies
        run: pip install -r services/media-worker/requirements.txt

      - name: Validate Docker Compose
        run: docker compose config

      - name: Run full verification suite
        run: npm run test:all
