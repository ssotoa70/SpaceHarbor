# Two deployments: one dedicated "worker" pod that runs background timers
# (audit-retention, lease-reaping, rate-limiter, trigger-consumer, dispatch
# poller, Kafka subscriber), and one horizontally-scalable "http" pod
# that handles request traffic only.
#
# This is the env-gate approach (SPACEHARBOR_BACKGROUND_WORKER flag) until
# Phase 4's proper leader-election primitive lands.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: spaceharbor-control-plane-worker
  labels:
    app: spaceharbor-control-plane
    role: worker
spec:
  replicas: 1  # exactly one — do NOT scale
  strategy:
    type: Recreate  # avoid two workers running simultaneously during rollout
  selector:
    matchLabels:
      app: spaceharbor-control-plane
      role: worker
  template:
    metadata:
      labels:
        app: spaceharbor-control-plane
        role: worker
      annotations:
        {{- if .Values.controlPlane.prometheus.scrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.controlPlane.prometheus.port }}"
        prometheus.io/path: "{{ .Values.controlPlane.prometheus.path }}"
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 35  # SPACEHARBOR_SHUTDOWN_TIMEOUT_MS = 30s
      containers:
        - name: control-plane
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPACEHARBOR_BACKGROUND_WORKER
              value: "true"
            {{- range $k, $v := .Values.controlPlane.env }}
            - name: {{ $k }}
              value: "{{ $v }}"
            {{- end }}
            {{- if .Values.controlPlane.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.controlPlane.otlpEndpoint }}"
            - name: OTEL_SERVICE_NAME
              value: "spaceharbor-control-plane-worker"
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.controlPlane.envFromSecret }}
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.controlPlane.healthCheck.livenessPath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.controlPlane.healthCheck.readinessPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: settings
              mountPath: /data
      volumes:
        - name: settings
          persistentVolumeClaim:
            claimName: spaceharbor-settings
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spaceharbor-control-plane-http
  labels:
    app: spaceharbor-control-plane
    role: http
spec:
  replicas: {{ sub (int .Values.controlPlane.replicas) 1 | default 1 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: spaceharbor-control-plane
      role: http
  template:
    metadata:
      labels:
        app: spaceharbor-control-plane
        role: http
      annotations:
        {{- if .Values.controlPlane.prometheus.scrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.controlPlane.prometheus.port }}"
        prometheus.io/path: "{{ .Values.controlPlane.prometheus.path }}"
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 35
      containers:
        - name: control-plane
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPACEHARBOR_BACKGROUND_WORKER
              value: "false"
            {{- range $k, $v := .Values.controlPlane.env }}
            - name: {{ $k }}
              value: "{{ $v }}"
            {{- end }}
            {{- if .Values.controlPlane.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.controlPlane.otlpEndpoint }}"
            - name: OTEL_SERVICE_NAME
              value: "spaceharbor-control-plane-http"
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.controlPlane.envFromSecret }}
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.controlPlane.healthCheck.livenessPath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.controlPlane.healthCheck.readinessPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: spaceharbor-control-plane
  labels:
    app: spaceharbor-control-plane
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
  selector:
    app: spaceharbor-control-plane
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spaceharbor-settings
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.settingsVolume.size }}
  {{- if .Values.settingsVolume.storageClass }}
  storageClassName: {{ .Values.settingsVolume.storageClass }}
  {{- end }}
{{- if .Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spaceharbor-control-plane-http
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spaceharbor-control-plane-http
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
