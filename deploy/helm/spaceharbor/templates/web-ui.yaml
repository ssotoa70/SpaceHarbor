apiVersion: apps/v1
kind: Deployment
metadata:
  name: spaceharbor-web-ui
  labels:
    app: spaceharbor-web-ui
spec:
  replicas: {{ .Values.webUi.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: spaceharbor-web-ui
  template:
    metadata:
      labels:
        app: spaceharbor-web-ui
    spec:
      containers:
        - name: web-ui
          image: "{{ .Values.webUi.image.repository }}:{{ .Values.webUi.image.tag }}"
          imagePullPolicy: {{ .Values.webUi.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          resources:
            {{- toYaml .Values.webUi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: spaceharbor-web-ui
  labels:
    app: spaceharbor-web-ui
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
  selector:
    app: spaceharbor-web-ui
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spaceharbor
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # API routes go to control-plane
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: spaceharbor-control-plane
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: spaceharbor-control-plane
                port:
                  number: 8080
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: spaceharbor-control-plane
                port:
                  number: 8080
          - path: /webhooks
            pathType: Prefix
            backend:
              service:
                name: spaceharbor-control-plane
                port:
                  number: 8080
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: spaceharbor-control-plane
                port:
                  number: 8080
          # Everything else → web-ui (SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spaceharbor-web-ui
                port:
                  number: 8080
{{- end }}
